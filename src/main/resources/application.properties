
# App name
spring.application.name=${APP_NAME}

# Server port (không để mặc định 8080 khi deploy, nên cấu hình qua env)
server.port=${PORT}

# Database config (chỉ dùng biến môi trường, không để giá trị mặc định)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}


payment.sepay.merchant-id=${SEPAY_MERCHANT_ID}
payment.sepay.secret-key=${SEPAY_SECRET_KEY}
payment.sepay.checkout-url=${SEPAY_CHECKOUT_URL}
payment.sepay.success-url=${PAYMENT_SEPAY_SUCCESS_URL}
payment.sepay.error-url=${PAYMENT_SEPAY_ERROR_URL}
payment.sepay.cancel-url=${PAYMENT_SEPAY_CANCEL_URL}
payment.sepay.frontend-result-url=${PAYMENT_SEPAY_FRONTEND_RESULT_URL}
payment.sepay.qr-image-base-url=${SEPAY_QR_IMAGE_BASE_URL}
payment.sepay.qr-account=${PAYMENT_SEPAY_QR_ACCOUNT}
payment.sepay.qr-bank=${PAYMENT_SEPAY_QR_BANK}
payment.sepay.qr-description-prefix=${PAYMENT_SEPAY_QR_DESCRIPTION_PREFIX}


jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
jwt.cookie-name=${JWT_COOKIE_NAME}
jwt.cookie-secure=${JWT_COOKIE_SECURE}
jwt.cookie-samesite=${JWT_COOKIE_SAMESITE}