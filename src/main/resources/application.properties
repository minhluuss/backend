spring.application.name=demo

# 1. DATABASE (Để cấu hình động, nếu ko có thì dùng localhost)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/movie_booking}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# 2. SEPAY (Giữ nguyên như bạn đã làm, rất chuẩn)
payment.sepay.merchant-id=${SEPAY_MERCHANT_ID:}
payment.sepay.secret-key=${SEPAY_SECRET_KEY:}
payment.sepay.checkout-url=https://pay.sepay.vn/v1/checkout/init
payment.sepay.success-url=${PAYMENT_SEPAY_SUCCESS_URL:http://localhost:8080/api/payments/sepay/success}
payment.sepay.error-url=${PAYMENT_SEPAY_ERROR_URL:http://localhost:8080/api/payments/sepay/error}
payment.sepay.cancel-url=${PAYMENT_SEPAY_CANCEL_URL:http://localhost:8080/api/payments/sepay/cancel}
payment.sepay.frontend-result-url=${PAYMENT_SEPAY_FRONTEND_RESULT_URL:http://localhost:5173/payment-result}
payment.sepay.qr-image-base-url=https://qr.sepay.vn/img
payment.sepay.qr-account=00000180046
payment.sepay.qr-bank=TPBank
payment.sepay.qr-description-prefix=TKPNBV

# 3. BẢO MẬT TOKEN
# Sửa thành dạng biến môi trường để không lộ mã bí mật lên GitHub
jwt.secret=${JWT_SECRET:my-very-long-secret-key-must-be-over-32-chars-long-123}

jwt.expiration-ms=604800000
jwt.cookie-name=auth_token

# Sửa thành dạng biến để tự động bật HTTPS khi lên Cloud
jwt.cookie-secure=${JWT_COOKIE_SECURE:false}
jwt.cookie-samesite=Lax

# OTP settings (minutes)
otp.expiration-minutes=10

# 4. GMAIL (XÓA MẬT KHẨU THẬT ĐI, THAY BẰNG BIẾN MÔI TRƯỜNG)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=moviebooking111@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true